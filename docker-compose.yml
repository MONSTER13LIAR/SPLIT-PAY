services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=splitpay
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app:z
    ports:
      - "8001:8000"
    user: root
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=518518930801-6b3lu430juulj4o9d38tvc0sk71vno0q.apps.googleusercontent.com
        - NEXT_PUBLIC_API_URL=http://localhost:8001/api
        - NEXT_PUBLIC_GOOGLE_REDIRECT_URI=http://localhost:3000/auth/callback
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
